services:
  - type: worker
    name: openclaw-bot
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python telegram_bot.py
    envVars:
      - key: OPENCLAW_MODEL
        value: claude-sonnet-4-6

  - type: web
    name: openclaw-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn web.app:app --host 0.0.0.0 --port $PORT
