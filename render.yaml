services:
  - type: web
    name: openclaw-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        scope: service
      - key: ANTHROPIC_API_KEY
        scope: service
      - key: TELEGRAM_TOKEN
        scope: service

  - type: worker
    name: openclaw-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: DATABASE_URL
        scope: service
      - key: ANTHROPIC_API_KEY
        scope: service
      - key: TELEGRAM_TOKEN
        scope: service
